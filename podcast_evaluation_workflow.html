    <textarea id="markdown-source" class="hidden"># SDH Award Podcast AI 評選工作流與時程成本規劃書 (Updated)

本規劃書專為**「無程式背景、每天限用筆電執行 2 小時」**的硬體與時間限制所設計。為確保筆電不發熱、不卡頓，且能在 1 小時內全自動完成，本方案推薦採用 **「雲端 API 直聽免轉寫」** 的架構。

---

## 🏆 獎項與評選軌道對照表 (Award-to-Track Mapping Matrix)

大賽的所有獎項已根據其屬性（文字、聲音、外部數據）進行了精準的分軌，避免混淆：

| 評選軌道 | 負責任務屬性 | 對應評估之大賽獎項 | 評估依據與數據源 |
| :--- | :--- | :--- | :--- |
| 🪶 **軌道 A**<br>(逐字稿文本分析軌) | **分析「節目內容與架構」**<br>著重在文字邏輯、企劃創意與主持人的內容引導。 | 1. **【最佳內容架構獎】**<br>2. **【最神企劃獎】**<br>3. **【動滋動滋獎/推坑王獎 (CTA)】**<br>4. **【稀有保護動物獎/小眾市場獎】**<br>5. **【自我探索獎】**<br>6. **【時間很短獎/泡麵沒熟獎】** | **單集逐字稿 (ASR Text)**<br>透過 AI 閱
## 🎯 複審決選：各獎項 Top 3 聲音診斷與黃金 3 片段規劃

當軌道 A 與 C 評選出各獎項 of **Top 3 入圍名單**後（去重後約為 **15 至 20 檔節目**），我們針對這批「入圍決選節目」進行深度的聲音物理診斷與黃金時間軸提取。

為了更全面且客觀地評估主持人的聲音特質與節目表現，**每個入圍節目需要評估 3 個不同單集，且每一集均由 AI 建議 3 段黃金試聽片段**（即每個入圍節目將提供共 9 段黃金片段，供真人評審針對重點進行試聽）。

### 1. 執行工具：Gemini 1.5 Pro API (直聽音檔)
*   **為什麼適合您**：雖然每檔節目評估集數增加至 3 集（總計約 45 至 60 集），但由於我們將音檔網址直接送給 Gemini 1.5 Pro 進行雲端並行處理，因此**依然能在 10 分鐘左右全自動分析完畢**，完全不佔用您本機的運算資源。
*   **預估成本**：Gemini 1.5 Pro 音訊 API 費率為 $0.0075 美元/分鐘。
    *   `60 集 × 40 分鐘 = 2400 分鐘`
    *   `總花費 = 2400 × 0.0075 = $18.00 美元` (約 **新台幣 580 元**)，仍在非常經濟實惠的範圍。

### 2. AI 診斷內容 (寫入 JSON/試算表)
我們要求 Gemini 針對入圍節目所選出的**每一集**輸出以下結構化欄位：
*   **【聲音特徵與音調建議】**：分析主持人的語速（字/分鐘）、音調波動、噴麥/雜音情況，並提供聲音製播建議。
*   **【每集最建議聽的 3 段時間軸】**：針對該單集，精確定位出 **3 段最值得聽的 3 分鐘精華區間**，並說明原因：
    1.  **片段 A (如 12:15 - 15:15)**：【內容火花段】（此段訪談問題切入極深，來賓分享了未曾公開的故事）。
    2.  **片段 B (如 22:30 - 25:30)**：【默契流暢段】（雙人互動極為自然，包含一次溫馨的共鳴笑聲）。
    3.  **片段 C (如 38:00 - 41:00)**：【陪伴療癒段】（語速降至 180 字/分，語氣平穩誠懇，具備強大治癒感）。

### 3. 人類終審 Google Sheet 呈現方式 (真人評審聽重點)
評審不需盲聽 15-20 檔節目共 30-40 小時的原始音檔，只需打開試算表：
*   點選各獎項頁面，查看 Top 3 節目（每個節目 3 集，每集 3 片段，共 9 片段）。
*   點擊試算表內提供的 **[播放片段 A]**、**[播放片段 B]**、**[播放片段 C]** 連結，只聽 3 分鐘精華。
*   真人評審在 **每檔節目 10-15 分鐘** 的聽評過程中即可做出極具信服力的最終評審決定。

---

## 三軌評估時間、成本與負載矩陣 (以 240 集 / 80 檔節目計算)

| 評估軌道 | 推薦實作做法 (對無背景筆電用戶最佳) | 預估執行時間 | 預估資金成本 (新台幣) | 筆電硬體負載 |
| :--- | :--- | :--- | :--- | :---: |
| **軌道 A**<br>(逐字稿文本分析) | **Gemini 1.5 Flash API 雲端直聽打分**<br>直接將 240 集 MP3 音檔網址傳給 Gemini，免去轉寫步驟，AI 在雲端邊聽邊評分。 | **30 ~ 45 分鐘**<br>(並行處理) | **約 NT$ 400 元**<br>(按音訊分鐘計費) | **0%**<br>(雲端運算) |
| **複審決選**<br>(各獎項 Top 3 診斷) | **Gemini 1.5 Pro API 聲音特徵與片段提取**<br>針對各獎項 **Top 3 入圍節目**（約 15-20 檔），**每檔評估 3 集**（共 45-60 集音檔）進行音質、默契診斷與每集各 3 段黃金時間軸提取。 | **8 ~ 12 分鐘**<br>(並行處理) | **約 NT$ 430 ~ 580 元**<br>(按音訊分鐘計費) | **0%**<br>(雲端運算) |
| **軌道 C**<br>(外部數據與社群) | **Node.js 輕量爬蟲工具**<br>一鍵調用 Apple Podcasts Reviews API 與 Spotify 網頁抓取評分。 | **2 分鐘內** | **NT$ 0 元**<br>(完全免費) | **1%**<br>(微量頻寬) |
| **總計** | **一鍵啟動自動化流程** | **60 分鐘內跑完** | **約 NT$ 830 ~ 980 元** | **安全不發熱** |

    <script>
        // Configure marked.js
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // Initialize Mermaid with Light theme
        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            securityLevel: 'loose',
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true
            }
        });

        // Tab Switching Logic
        function switchTab(tabId) {
            const planBtn = document.getElementById('tab-btn-plan');
            const statusBtn = document.getElementById('tab-btn-status');
            const timelineBtn = document.getElementById('tab-btn-timeline');
            
            const planContent = document.getElementById('content-plan');
            const statusContent = document.getElementById('content-status');
            const timelineContent = document.getElementById('content-timeline');

            const activeBtnClass = "flex-1 py-2.5 text-xs sm:text-sm font-bold rounded-lg transition-all duration-200 bg-white text-blue-600 shadow-sm border border-slate-200/10";
            const inactiveBtnClass = "flex-1 py-2.5 text-xs sm:text-sm font-semibold rounded-lg transition-all duration-200 text-slate-600 hover:text-slate-900 hover:bg-white/50";

            planBtn.className = inactiveBtnClass;
            statusBtn.className = inactiveBtnClass;
            timelineBtn.className = inactiveBtnClass;

            planContent.classList.add('hidden');
            statusContent.classList.add('hidden');
            timelineContent.classList.add('hidden');

            if (tabId === 'plan') {
                planBtn.className = activeBtnClass;
                planContent.classList.remove('hidden');
            } else if (tabId === 'status') {
                statusBtn.className = activeBtnClass;
                statusContent.classList.remove('hidden');
            } else {
                timelineBtn.className = activeBtnClass;
                timelineContent.classList.remove('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const rawMarkdown = document.getElementById('markdown-source').value;
            const parts = rawMarkdown.split('<!-- tab-split -->');
            const planMd = parts[0] || '';
            const statusMd = parts[1] || '';
            const timelineMd = parts[2] || '';
            
            // Render Plan Markdown
            const planHtml = marked.parse(planMd);
            const planContainer = document.getElementById('content-plan');
            planContainer.innerHTML = planHtml;

            // Render Status Markdown
            const statusHtml = marked.parse(statusMd);
            const statusContainer = document.getElementById('content-status');
            statusContainer.innerHTML = statusHtml;

            // Render Timeline Markdown
            const timelineHtml = marked.parse(timelineMd);
            const timelineContainer = document.getElementById('content-timeline');
            timelineContainer.innerHTML = timelineHtml;

            // Find and convert Mermaid blocks in all containers
            [planContainer, statusContainer, timelineContainer].forEach(container => {
                const codeBlocks = container.querySelectorAll('pre code');
                codeBlocks.forEach(codeBlock => {
                    if (codeBlock.classList.contains('language-mermaid')) {
                        const preElement = codeBlock.parentElement;
                        const mermaidDiv = document.createElement('div');
                        mermaidDiv.className = 'mermaid my-8 p-4 bg-slate-50 rounded-xl border border-slate-200 overflow-x-auto';
                        mermaidDiv.textContent = codeBlock.textContent;
                        preElement.replaceWith(mermaidDiv);
                    }
                });
            });

            // Run Mermaid rendering
            try {
                await mermaid.run();
            } catch (err) {
                console.error("Mermaid 渲染出錯:", err);
            }
        });
    </script>
